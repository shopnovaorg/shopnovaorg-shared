name: SonarQube and Snyk Security Scan

on:
  workflow_call:
    inputs:
      service-name:
        description: "Name of the service (e.g. auth-service)"
        required: true
        type: string
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true

jobs:
  sonar-and-snyk:
    name: SonarQube + Snyk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: SonarQube Scan
        id: sonar-scan
        uses: sonarsource/sonarqube-scan-action@v6
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        if: steps.sonar-scan.outcome == 'success'
        id: sonar-gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Install Snyk CLI
        run: npm install -g snyk snyk-to-html

      - name: Run Snyk dependency scan
        id: snyk-scan
        run: snyk test --json-file-output=snyk-results.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Generate Snyk HTML report
        if: always() && steps.snyk-scan.outcome != 'skipped' && hashFiles('snyk-results.json') != ''
        run: snyk-to-html -i snyk-results.json -o snyk-report.html

      - name: Upload Snyk HTML report as artifact
        if: always() && steps.snyk-scan.outcome != 'skipped' && hashFiles('snyk-results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report-${{ inputs.service-name }}
          path: snyk-report.html
          retention-days: 14


      - name: Check results and set final status
        if: always()
        run: |
          echo "=== CI Validation Summary ==="

          SONAR_RESULT="${{ steps.sonar-scan.outcome }}"
          GATE_RESULT="${{ steps.sonar-gate.outcome }}"
          SNYK_RESULT="${{ steps.snyk-scan.outcome }}"

          echo "SonarQube Scan:       $SONAR_RESULT"
          echo "SonarQube Gate:       $GATE_RESULT"
          echo "Snyk Scan:            $SNYK_RESULT"

          FAILED=0

          if [[ "$SONAR_RESULT" == "failure" ]]; then
            echo "⚠️  WARN: SonarQube scan failed (server unreachable or config error) — skipping gate."
          fi

          if [[ "$GATE_RESULT" == "failure" ]]; then
            echo "❌ FAIL: SonarQube quality gate failed — code does not meet quality standards."
            FAILED=1
          fi

          if [[ "$SNYK_RESULT" == "failure" ]]; then
            echo "⚠️  WARN: Snyk found vulnerabilities — see uploaded HTML report."
          fi

          exit $FAILED
