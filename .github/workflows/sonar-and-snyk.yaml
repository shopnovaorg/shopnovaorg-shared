name: SonarQube and Snyk Security Scan

on:
  workflow_call:
    inputs:
      service-name:
        description: "Name of the service (e.g. auth-service)"
        required: true
        type: string
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true

jobs:
  sonar-and-snyk:
    name: SonarQube + Snyk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for SonarQube blame data

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── SonarQube ─────────────────────────────────────────────────────────────
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ── Snyk ──────────────────────────────────────────────────────────────────
      - name: Install Snyk CLI
        run: npm install -g snyk snyk-to-html

      - name: Run Snyk dependency scan
        run: snyk test --json-file-output=snyk-results.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Do not fail the step so we can still generate the HTML report;
        # the workflow will be marked failed by the upload step outcome
        continue-on-error: true

      - name: Generate Snyk HTML report
        if: always()
        run: snyk-to-html -i snyk-results.json -o snyk-report.html

      - name: Upload Snyk HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report-${{ inputs.service-name }}
          path: snyk-report.html
          retention-days: 14

      # Fail the job if Snyk found vulnerabilities (exit code != 0 from above)
      - name: Assert Snyk passed
        run: |
          if [ ! -f snyk-results.json ]; then
            echo "Snyk results file not found, scan may have failed"
            exit 1
          fi
          VULN_COUNT=$(cat snyk-results.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('vulnerabilities', []) and len(d.get('vulnerabilities',[])) or 0)" 2>/dev/null || echo "0")
          echo "Snyk found ${VULN_COUNT} vulnerabilities"
          # Fail if Snyk test exited non-zero AND there are high/critical issues
          EXIT_CODE=$(cat snyk-results.json | python3 -c "import sys,json; d=json.load(sys.stdin); has_high=any(v.get('severity','') in ['high','critical'] for v in d.get('vulnerabilities',[])); print(1 if has_high else 0)" 2>/dev/null || echo "0")
          exit $EXIT_CODE
