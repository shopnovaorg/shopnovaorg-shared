name: Generate Tag, Build Image and Trivy Scan

on:
  workflow_call:
    inputs:
      image-name:
        description: "DockerHub image name (e.g. abhinavbabu33/shopnova-auth-service)"
        required: true
        type: string
      service-name:
        description: "Short service identifier (e.g. auth-service)"
        required: true
        type: string
      run-trivy:
        description: "Whether to run Trivy scan (true on PRs, false on direct pushes)"
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
    outputs:
      image-tag:
        description: "The generated image tag to be used by push.yaml"
        value: ${{ jobs.build.outputs.image-tag }}
      tag-exists:
        description: "Whether the image tag already existed on DockerHub (skipped build)"
        value: ${{ jobs.build.outputs.tag-exists }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag:  ${{ steps.set-tag.outputs.image-tag }}
      tag-exists: ${{ steps.check-tag.outputs.tag-exists }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version (main only)
        id: semver
        if: github.ref_name == 'main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          tag_prefix: "${{ inputs.service-name }}-v"
          dry_run: true
          default_bump: patch

      - name: Generate image tag
        id: set-tag
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            IMAGE_TAG="${{ steps.semver.outputs.new_tag }}"
            echo "✅ Generated semver tag: $IMAGE_TAG"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            IMAGE_TAG="dev-${SHORT_SHA}"
            echo "✅ Generated dev tag: $IMAGE_TAG"
          fi
          echo "image-tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Check if image tag already exists on DockerHub
        id: check-tag
        run: |
          TAG="${{ steps.set-tag.outputs.image-tag }}"
          IMAGE="${{ inputs.image-name }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/")

          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "⚠️ Image tag '${TAG}' already exists on DockerHub — skipping build."
            echo "tag-exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "🔨 Image tag '${TAG}' not found — proceeding with build."
            echo "tag-exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check-tag.outputs.tag-exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.check-tag.outputs.tag-exists == 'false'
        run: |
          docker build \
            -t ${{ inputs.image-name }}:${{ steps.set-tag.outputs.image-tag }} \
            .

      - name: Save Docker image as tar artifact
        if: steps.check-tag.outputs.tag-exists == 'false'
        run: |
          docker save \
            ${{ inputs.image-name }}:${{ steps.set-tag.outputs.image-tag }} \
            -o /tmp/image-${{ inputs.service-name }}.tar

      - name: Upload Docker image artifact
        if: steps.check-tag.outputs.tag-exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: /tmp/image-${{ inputs.service-name }}.tar
          retention-days: 1

  trivy:
    name: Trivy Image Scan
    needs: [build]
    if: |
      always() &&
      inputs.run-trivy == true &&
      needs.build.result == 'success' &&
      needs.build.outputs.tag-exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/image-${{ inputs.service-name }}.tar
          echo "✅ Image loaded for Trivy scan"

      - name: Run Trivy image scan
        id: trivy-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image-${{ inputs.service-name }}.tar
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Check Trivy result
        if: always()
        run: |
          if [[ "${{ steps.trivy-scan.outcome }}" == "failure" ]]; then
            echo "❌ FAIL: Trivy found CRITICAL vulnerabilities in the image."
            exit 1
          fi
          echo "✅ Trivy scan passed — no CRITICAL vulnerabilities found."
