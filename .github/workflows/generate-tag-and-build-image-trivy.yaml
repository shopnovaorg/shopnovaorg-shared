name: Generate Tag, Build Image and Trivy Scan

on:
  workflow_call:
    inputs:
      image-name:
        description: "DockerHub image name (e.g. abhinavbabu33/shopnova-auth-service)"
        required: true
        type: string
      service-name:
        description: "Short service identifier (e.g. auth-service)"
        required: true
        type: string
      run-trivy:
        description: "Whether to run Trivy scan (true on PRs, false on direct pushes)"
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
    outputs:
      image-tag:
        description: "The generated image tag to be used by push.yaml"
        value: ${{ jobs.build.outputs.image-tag }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so git tag --list works correctly

      # ── Tag Generation ────────────────────────────────────────────────────────
      - name: Generate image tag
        id: set-tag
        run: |
          BRANCH="${{ github.ref_name }}"
          SERVICE="${{ inputs.service-name }}"

          if [[ "$BRANCH" == "main" ]]; then
            # Find the latest existing semantic version tag for this service
            LATEST_TAG=$(git tag --list "${SERVICE}-v*" --sort=-v:refname | head -n 1)

            if [[ -z "$LATEST_TAG" ]]; then
              # First ever release
              NEW_VERSION="v1.0.0"
            else
              # Increment patch version
              VERSION="${LATEST_TAG#${SERVICE}-v}"
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi

            IMAGE_TAG="${SERVICE}-${NEW_VERSION}"
          else
            # dev branch: branch-name + short SHA
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            IMAGE_TAG="dev-${SHORT_SHA}"
          fi

          echo "image-tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "✅ Generated tag: ${IMAGE_TAG}"

      # ── DockerHub Tag Existence Check ─────────────────────────────────────────
      - name: Check if image tag already exists on DockerHub
        id: check-tag
        run: |
          TAG="${{ steps.set-tag.outputs.image-tag }}"
          IMAGE="${{ inputs.image-name }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/")

          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "⚠️ Image tag '${TAG}' already exists on DockerHub — skipping build."
            echo "tag-exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "🔨 Image tag '${TAG}' not found — proceeding with build."
            echo "tag-exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Docker Build ──────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        if: steps.check-tag.outputs.tag-exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.check-tag.outputs.tag-exists == 'false'
        run: |
          docker build \
            -t ${{ inputs.image-name }}:${{ steps.set-tag.outputs.image-tag }} \
            .

      - name: Save Docker image as tar artifact
        if: steps.check-tag.outputs.tag-exists == 'false'
        run: |
          docker save \
            ${{ inputs.image-name }}:${{ steps.set-tag.outputs.image-tag }} \
            -o image-${{ inputs.service-name }}.tar

      - name: Upload Docker image artifact
        if: steps.check-tag.outputs.tag-exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: image-${{ inputs.service-name }}.tar
          retention-days: 1

      # ── Trivy Scan (PR only) ──────────────────────────────────────────────────
      - name: Run Trivy image scan
        if: inputs.run-trivy == true && steps.check-tag.outputs.tag-exists == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          input: image-${{ inputs.service-name }}.tar
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
