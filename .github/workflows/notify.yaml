name: Failure Notification

on:
  workflow_call:
    inputs:
      service-name:
        description: "Name of the service (e.g. auth-service)"
        required: true
        type: string
      branch:
        description: "The branch where the failure occurred"
        required: true
        type: string
      run-id:
        description: "GitHub Actions run ID for the direct link"
        required: true
        type: string
      repository:
        description: "Repository full name (org/repo)"
        required: true
        type: string
      git-tag:
        description: "The image tag generated (if build ran)"
        required: false
        type: string
        default: "N/A"
      sonarqube-result:
        description: "Result of the SonarQube + Snyk validate job"
        required: false
        type: string
        default: "skipped"
      snyk-result:
        description: "Result of the Snyk scan job"
        required: false
        type: string
        default: "skipped"
      build-result:
        description: "Result of the build job"
        required: false
        type: string
        default: "skipped"
      trivy-result:
        description: "Result of the Trivy scan job"
        required: false
        type: string
        default: "skipped"
      push-result:
        description: "Result of the push-to-DockerHub job"
        required: false
        type: string
        default: "skipped"
    secrets:
      SENDGRID_API_KEY:
        required: true
      NOTIFY_EMAIL_TO:
        required: true
      NOTIFY_EMAIL_FROM:
        required: true

jobs:
  notify:
    name: Send Failure Email
    runs-on: ubuntu-latest
    if: |
      inputs.sonarqube-result == 'failure' ||
      inputs.snyk-result      == 'failure' ||
      inputs.build-result     == 'failure' ||
      inputs.trivy-result     == 'failure' ||
      inputs.push-result      == 'failure'

    steps:
      - name: Build failure summary
        id: summary
        run: |
          FAILED_JOBS=""

          if [[ "${{ inputs.sonarqube-result }}" == "failure" ]]; then
            FAILED_JOBS="${FAILED_JOBS}| Validate (Sonar + Snyk) | ❌ failure |\n"
          fi
          if [[ "${{ inputs.snyk-result }}" == "failure" ]]; then
            FAILED_JOBS="${FAILED_JOBS}| Snyk Scan | ❌ failure |\n"
          fi
          if [[ "${{ inputs.build-result }}" == "failure" ]]; then
            FAILED_JOBS="${FAILED_JOBS}| Build Image | ❌ failure |\n"
          fi
          if [[ "${{ inputs.trivy-result }}" == "failure" ]]; then
            FAILED_JOBS="${FAILED_JOBS}| Trivy Image Scan | ❌ failure |\n"
          fi
          if [[ "${{ inputs.push-result }}" == "failure" ]]; then
            FAILED_JOBS="${FAILED_JOBS}| Push to DockerHub | ❌ failure |\n"
          fi

          echo "failed_jobs=${FAILED_JOBS}" >> "$GITHUB_OUTPUT"

      - name: Send failure notification
        uses: licenseware/send-email-notification@v1
        with:
          api-key: ${{ secrets.SENDGRID_API_KEY }}
          subject: "CI FAILED — ${{ inputs.service-name }} (${{ inputs.branch }})"
          from-email: ${{ secrets.NOTIFY_EMAIL_FROM }}
          to-email: ${{ secrets.NOTIFY_EMAIL_TO }}
          markdown-body: |
            ## 🚨 CI Pipeline Failure

            ### Details

            | Field      | Value |
            |------------|-------|
            | **Service** | ${{ inputs.service-name }} |
            | **Branch**  | ${{ inputs.branch }} |
            | **Tag**     | ${{ inputs.git-tag }} |
            | **Run ID**  | ${{ inputs.run-id }} |
            | **Link**    | [View failed run →](https://github.com/${{ inputs.repository }}/actions/runs/${{ inputs.run-id }}) |

            ### ❌ Failed Jobs

            | Job | Result |
            |-----|--------|
            ${{ steps.summary.outputs.failed_jobs }}

            ### All Job Results

            | Job | Result |
            |-----|--------|
            | Validate (Sonar + Snyk) | ${{ inputs.sonarqube-result }} |
            | Snyk Scan               | ${{ inputs.snyk-result }} |
            | Build Image             | ${{ inputs.build-result }} |
            | Trivy Image Scan        | ${{ inputs.trivy-result }} |
            | Push to DockerHub       | ${{ inputs.push-result }} |
