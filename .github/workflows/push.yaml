name: Push Docker Image to DockerHub

on:
  workflow_call:
    inputs:
      image-name:
        description: "DockerHub image name (e.g. abhinavbabu33/shopnova-auth-service)"
        required: true
        type: string
      image-tag:
        description: "The versioned image tag generated by the build job"
        required: true
        type: string
      service-name:
        description: "Short service identifier (e.g. auth-service)"
        required: true
        type: string
      is-main:
        description: "True when pushing to main branch — enables latest tag and git tag creation"
        required: true
        type: boolean
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  push:
    name: Push to DockerHub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Load image from artifact ───────────────────────────────────────────────
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}

      - name: Load Docker image
        run: |
          docker load -i image-${{ inputs.service-name }}.tar
          echo "✅ Image loaded: ${{ inputs.image-name }}:${{ inputs.image-tag }}"

      # ── DockerHub Login & Push ────────────────────────────────────────────────
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push versioned image tag
        run: |
          docker push ${{ inputs.image-name }}:${{ inputs.image-tag }}
          echo "✅ Pushed: ${{ inputs.image-name }}:${{ inputs.image-tag }}"

      # main branch only — push :latest
      - name: Tag and push as latest
        if: inputs.is-main == true
        run: |
          docker tag \
            ${{ inputs.image-name }}:${{ inputs.image-tag }} \
            ${{ inputs.image-name }}:latest
          docker push ${{ inputs.image-name }}:latest
          echo "✅ Pushed: ${{ inputs.image-name }}:latest"

      # main branch only — create git tag in the service repo
      - name: Create and push git tag
        if: inputs.is-main == true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.image-tag }}"

          # Check if this git tag already exists remotely
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "⚠️ Git tag '${TAG}' already exists — skipping tag creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "✅ Git tag '${TAG}' created and pushed."
          fi
