name: Push Docker Image to DockerHub

on:
  workflow_call:
    inputs:
      image-name:
        description: "DockerHub image name (e.g. abhinavbabu33/shopnova-auth-service)"
        required: true
        type: string
      image-tag:
        description: "The versioned image tag generated by the build job"
        required: true
        type: string
      service-name:
        description: "Short service identifier (e.g. auth-service)"
        required: true
        type: string
      is-main:
        description: "True when pushing to main branch — enables latest tag and git tag creation"
        required: true
        type: boolean
      tag-exists:
        description: "Set to 'true' if the build job skipped because the tag already exists on DockerHub"
        required: false
        type: string
        default: "false"
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  push:
    name: Push to DockerHub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip push — image tag already exists
        if: inputs.tag-exists == 'true'
        run: |
          echo "⚠️ Image tag '${{ inputs.image-tag }}' already exists on DockerHub."
          echo "Skipping download, load, and push steps."

      - name: Download Docker image artifact
        if: inputs.tag-exists != 'true'
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: /tmp

      - name: Load Docker image
        if: inputs.tag-exists != 'true'
        run: |
          docker load -i /tmp/image-${{ inputs.service-name }}.tar
          echo "✅ Image loaded: ${{ inputs.image-name }}:${{ inputs.image-tag }}"

      - name: Login to DockerHub
        if: inputs.tag-exists != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push versioned image tag
        if: inputs.tag-exists != 'true'
        run: |
          LOADED_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n1)
          docker tag "$LOADED_IMAGE" "${{ inputs.image-name }}:${{ inputs.image-tag }}"
          docker push ${{ inputs.image-name }}:${{ inputs.image-tag }}
          echo "✅ Pushed: ${{ inputs.image-name }}:${{ inputs.image-tag }}"

      - name: Tag and push as latest
        if: inputs.tag-exists != 'true' && inputs.is-main == true
        run: |
          docker tag \
            ${{ inputs.image-name }}:${{ inputs.image-tag }} \
            ${{ inputs.image-name }}:latest
          docker push ${{ inputs.image-name }}:latest
          echo "✅ Pushed: ${{ inputs.image-name }}:latest"

      - name: Create and push git tag
        if: inputs.tag-exists != 'true' && inputs.is-main == true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ inputs.image-tag }}
          git push origin ${{ inputs.image-tag }}
          echo "✅ Git tag '${{ inputs.image-tag }}' created and pushed."
